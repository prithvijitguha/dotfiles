- hosts: local
  become: true

  vars_files:
    - vars.yml

  tasks:

    ########################################################
    # APT BASE
    ########################################################

    - name: Update apt cache
      apt:
        update_cache: true
        cache_valid_time: 3600

    ########################################################
    # INSTALL BASE APT PACKAGES
    ########################################################

    - name: Install apt packages
      apt:
        name:
          - "{{ apt_packages }}"
          - chezmoi
        state: present
        update_cache: true

    ########################################################
    # INSTALL NODE.JS + NPM
    ########################################################

    - name: Install Node.js
      shell: |
        curl -fsSL https://deb.nodesource.com/setup_lts.x | sudo -E bash -
        sudo apt install -y nodejs
      args:
        creates: /usr/bin/node

    ########################################################
    # INSTALL GITHUB CLI
    ########################################################

    - name: Install GitHub CLI
      shell: |
        (type -p wget >/dev/null || (sudo apt update && sudo apt install wget -y)) \
        && sudo mkdir -p -m 755 /etc/apt/keyrings \
        && out=$(mktemp) && wget -nv -O$out https://cli.github.com/packages/githubcli-archive-keyring.gpg \
        && cat $out | sudo tee /etc/apt/keyrings/githubcli-archive-keyring.gpg > /dev/null \
        && sudo chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg \
        && sudo mkdir -p -m 755 /etc/apt/sources.list.d \
        && echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null \
        && sudo apt update \
        && sudo apt install gh -y
      args:
        creates: /usr/bin/gh

    ########################################################
    # NPM GLOBALS
    ########################################################

    - name: Install npm global packages
      community.general.npm:
        name: "{{ item }}"
        global: true
      loop: "{{ npm_packages }}"

    ########################################################
    # UV
    ########################################################

    - name: Install uv
      shell: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
      args:
        creates: "{{ ansible_env.HOME }}/.local/bin/uv"

    ########################################################
    # RUSTUP / CARGO
    ########################################################

    - name: Install rustup and cargo
      shell: |
        curl https://sh.rustup.rs -sSf | sh -s -- -y
      args:
        creates: "{{ ansible_env.HOME }}/.cargo/bin/rustup"

    ########################################################
    # OH MY ZSH
    ########################################################

    - name: Install Oh My Zsh
      git:
        repo: https://github.com/ohmyzsh/ohmyzsh.git
        dest: "{{ ansible_env.HOME }}/.oh-my-zsh"
        depth: 1

    ########################################################
    # POWERLEVEL10K
    ########################################################

    - name: Install Powerlevel10k
      git:
        repo: https://github.com/romkatv/powerlevel10k.git
        dest: "{{ ansible_env.HOME }}/.oh-my-zsh/custom/themes/powerlevel10k"
        depth: 1

    ########################################################
    # SET DEFAULT SHELL
    ########################################################

    - name: Set zsh as default shell
      user:
        name: "{{ ansible_user_id }}"
        shell: /usr/bin/zsh

    ########################################################
    # VIM-PLUG
    ########################################################

    - name: Create Vim autoload directory
      file:
        path: "{{ ansible_env.HOME }}/.vim/autoload"
        state: directory
        mode: '0755'

    - name: Install vim-plug for Vim
      get_url:
        url: https://raw.githubusercontent.com/junegunn/vim-plug/master/plug.vim
        dest: "{{ ansible_env.HOME }}/.vim/autoload/plug.vim"
        mode: '0644'

    ########################################################
    # TPM (TMUX PLUGIN MANAGER)
    ########################################################

    - name: Install TPM
      git:
        repo: https://github.com/tmux-plugins/tpm
        dest: "{{ ansible_env.HOME }}/.tmux/plugins/tpm"
        depth: 1

    ########################################################
    # NERD FONT - JETBRAINS MONO
    ########################################################

    - name: Create fonts directory
      file:
        path: "{{ ansible_env.HOME }}/.local/share/fonts"
        state: directory
        mode: '0755'

    - name: Download JetBrainsMono Nerd Font
      get_url:
        url: https://github.com/ryanoasis/nerd-fonts/releases/latest/download/JetBrainsMono.zip
        dest: /tmp/JetBrainsMono.zip

    - name: Extract JetBrainsMono Nerd Font
      unarchive:
        src: /tmp/JetBrainsMono.zip
        dest: "{{ ansible_env.HOME }}/.local/share/fonts"
        remote_src: true

    - name: Refresh font cache
      shell: fc-cache -fv
      changed_when: false
