# List of plugins
set -g default-terminal 'xterm-256color' 
set -g mouse on
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank' 
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'dracula/tmux' 
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
set -g @dracula-show-powerline true
set -g @dracula-plugins "cpu-usage ram-usage time network"
set -g @plugin 'tmux-plugins/tmux-open'

# Make default shell for tmux
set-option -g default-shell /bin/zsh

# Dim inactive panes
set -g window-style 'fg=colour240,bg=colour235'
# Bright active pane
set -g window-active-style 'fg=colour255,bg=colour234'
# Blue pane borders
set -g pane-border-style 'fg=colour33'
# Bright blue active pane border
set -g pane-active-border-style 'fg=colour39'

set -g extended-keys on
# Better window renaming 
set -g automatic-rename on
set -g automatic-rename-format '#{pane_current_command}'

# Auto-install TPM plugins if missing
run-shell '~/.tmux/plugins/tpm/bin/install_plugins'
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
